<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Exercise 9 Geolocation</title></head>
<body>
<h1>Find Nearby Events</h1>
<button onclick="findLocation()">Find Nearby Events</button>
<p id="location"></p>
<script>
function findLocation(){
navigator.geolocation.getCurrentPosition(success,error,{
enableHighAccuracy:true,
timeout:5000
});
}
function success(p){
location.innerHTML="Latitude: "+p.coords.latitude+"<br>Longitude: "+p.coords.longitude;
}
function error(e){
location.innerHTML="Location error: "+e.message;
}
</script>
</body>
</html>
