<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Exercise 8 Storage</title></head>
<body>
<h1>Save User Preferences</h1>
<select id="eventPreference" onchange="savePreference()">
<option value="">Select Event</option>
<option>Music</option>
<option>Sports</option>
<option>Workshop</option>
</select>
<button onclick="clearPreference()">Clear Preferences</button>
<p id="message"></p>
<script>
function savePreference(){
let e=document.getElementById("eventPreference").value;
localStorage.setItem("preferredEvent",e);
sessionStorage.setItem("currentEvent",e);
message.innerHTML="Saved: "+e;
}
window.onload=function(){
let e=localStorage.getItem("preferredEvent");
if(e) eventPreference.value=e;
}
function clearPreference(){
localStorage.clear();
sessionStorage.clear();
eventPreference.value="";
message.innerHTML="Preferences Cleared";
}
</script>
</body>
</html>
